name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install task
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          GOBIN="${RUNNER_TEMP}/bin" go install github.com/go-task/task/v3/cmd/task@v3.50.0
          echo "${RUNNER_TEMP}/bin" >>"${GITHUB_PATH}"

      - name: Run release preflight checks
        run: task release:preflight

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: v2.12.7
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate provenance attestations for release archives
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: dist/checksums.txt

      - name: Generate provenance attestation for checksums.txt
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/checksums.txt

      - name: Determine release channel (stable only)
        id: channel
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" == *-* ]]; then
            echo "stable=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "stable=true" >>"${GITHUB_OUTPUT}"

      - name: Create GitHub App token for Homebrew tap
        if: steps.channel.outputs.stable == 'true'
        id: homebrew-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_KEY }}
          owner: tasuku43
          repositories: homebrew-cc-bash-guard

      - name: Checkout Homebrew tap
        if: steps.channel.outputs.stable == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tasuku43/homebrew-cc-bash-guard
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap

      - name: Update Homebrew formula (working tree)
        if: steps.channel.outputs.stable == 'true'
        working-directory: homebrew-tap
        run: |
          ../.github/scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" "../dist/checksums.txt"

      - name: Create PR for Homebrew formula update
        if: steps.channel.outputs.stable == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap
          commit-message: "Update Homebrew formula for ${{ github.ref_name }}"
          title: "Update Homebrew formula for ${{ github.ref_name }}"
          body: |
            Updates `Formula/cc-bash-guard.rb` to point to GitHub Releases artifacts for `${{ github.ref_name }}`.
          add-paths: |
            Formula/cc-bash-guard.rb
          base: main
          branch: "chore/homebrew-formula-${{ github.ref_name }}"
          delete-branch: true
