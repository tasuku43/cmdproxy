version: "3"

vars:
  BIN: cmdproxy

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the cmdproxy binary into the repository root
    cmds:
      - go build -o {{.BIN}} ./cmd/cmdproxy

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  vulncheck:
    desc: Run govulncheck
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  release:preflight:
    desc: Run pre-release verification checks
    cmds:
      - |
        unformatted="$(gofmt -l .)"
        if [ -n "${unformatted}" ]; then
          echo "These files are not gofmt'd:"
          echo "${unformatted}"
          exit 1
        fi
      - task: vet
      - task: test
      - task: vulncheck

  clean:
    desc: Remove the built binary from the repository root
    cmds:
      - rm -f {{.BIN}}
